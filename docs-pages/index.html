<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soo-Pul · SooNet-Pulmonary</title>
  <meta name="description" content="Soo-Pul · SooNet-Pulmonary Clinical Decision Support — SKKU AWS SAY 2nd cohort, Team 2" />
  <link rel="icon" href="data:," />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0C447C; font-family: -apple-system, 'Segoe UI', sans-serif; color: white; }
    #app-frame { border: 0; width: 100vw; height: 100vh; display: block; }
    #fallback {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center; flex-direction: column;
      padding: 24px; text-align: center;
    }
    #fallback.visible { display: flex; }
    #fallback a { color: white; font-weight: 600; text-decoration: underline; margin-top: 12px; font-size: 18px; }
    #fallback small { opacity: 0.65; margin-top: 8px; font-size: 13px; }
    #loading {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center; flex-direction: column;
      pointer-events: none; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: white;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <iframe
    id="app-frame"
    src="https://d300v14l8u0wx7.cloudfront.net/"
    title="Soo-Pul Application"
    allow="clipboard-read; clipboard-write; fullscreen; web-share"
    referrerpolicy="origin"
    loading="eager"></iframe>

  <div id="loading">
    <div class="spinner"></div>
    <div>Soo-Pul 로딩 중...</div>
  </div>

  <div id="fallback">
    <div style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">Soo-Pul · SooNet-Pulmonary</div>
    <div>임베드 화면이 로드되지 않습니다.</div>
    <a href="https://d300v14l8u0wx7.cloudfront.net/" target="_blank" rel="noopener">새 탭에서 열기 →</a>
    <small>CloudFront 가 일시적으로 차단됐거나 네트워크 이슈가 있을 수 있습니다.</small>
  </div>

  <script>
    (function () {
      var iframe = document.getElementById('app-frame');
      var loading = document.getElementById('loading');
      var fallback = document.getElementById('fallback');
      var loaded = false;

      iframe.addEventListener('load', function () {
        loaded = true;
        loading.classList.add('hidden');
        setTimeout(function () { loading.style.display = 'none'; }, 400);
      });

      // Timeout: if not loaded after 15s show "open in new tab" link.
      setTimeout(function () {
        if (!loaded) {
          loading.style.display = 'none';
          fallback.classList.add('visible');
        }
      }, 15000);
    })();
  </script>
</body>
</html>
